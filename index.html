<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- iPhoneのホーム画面に追加したときのアイコン設定 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="パパ力診断" />
  <title>パパ力診断</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==============================
       画面①：トップ画面
  ============================== -->
  <div id="screen-top" class="screen active">
    <div class="top-wrap">
      <div class="top-badge">🏅 Official</div>
      <div class="top-icon">👨‍👧‍👦</div>
      <h1 class="top-title">パパ力<br>診断</h1>
      <p class="top-sub">15問の質問に答えて<br>あなたのパパ力を測定しよう！</p>
      <div class="top-stats-row">
        <div class="stat-chip">📊 5項目評価</div>
        <div class="stat-chip">🏆 S〜Dランク</div>
      </div>
      <button class="btn-start" onclick="startQuiz()">
        診断スタート！
        <span class="btn-arrow">→</span>
      </button>
      <p class="top-note">※ 所要時間：約2分</p>
    </div>
  </div>

  <!-- ==============================
       画面②：質問画面
  ============================== -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-wrap">

      <!-- ヘッダー -->
      <div class="quiz-header">
        <button class="btn-back" id="btn-back" onclick="goBack()">← 戻る</button>
        <span class="quiz-num" id="quiz-num">1 / 15</span>
      </div>

      <!-- プログレスバー＋残り問数 -->
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-remain" id="progress-remain">あと15問！</span>
      </div>

      <!-- 質問テキスト -->
      <div class="question-card">
        <div class="question-icon" id="question-icon">🤔</div>
        <p class="question-text" id="question-text">質問文がここに入ります</p>
      </div>

      <!-- 選択肢ボタン -->
      <div class="choices" id="choices"></div>

    </div>
  </div>

  <!-- ローディング画面 -->
  <div id="screen-loading" class="screen">
    <div class="loading-wrap">
      <div class="loading-spinner">⚙️</div>
      <p class="loading-text">結果を集計中…</p>
    </div>
  </div>

  <!-- ==============================
       画面③：結果画面
  ============================== -->
  <div id="screen-result" class="screen">
    <div class="result-wrap">

      <!-- ① ヘッダー -->
      <div class="result-banner">
        <span class="banner-eyebrow">✦ DIAGNOSIS RESULT ✦</span>
        <span class="banner-title">あなたのパパ力は・・・</span>
      </div>
      <div class="result-top">

        <!-- 左：ランク -->
        <div class="result-left">
          <p class="rank-eyebrow">総合ランク</p>
          <div class="rank-badge" id="rank-badge">
            <span class="rank-letter" id="rank-letter">S</span>
          </div>
          <p class="rank-name" id="rank-name">スーパーパパ</p>
        </div>

        <!-- 右：ステータス縦並び -->
        <div class="result-right">
          <div class="status-list-v" id="status-list"></div>
        </div>

      </div>

      <!-- ③ 特殊能力 -->
      <div class="skills-row-wrap">
        <p class="skills-row-label">⚡ 特殊能力</p>
        <div class="skills-row" id="skills-list"></div>
      </div>

      <!-- ④ ママコメント -->
      <div class="comment-compact" id="wife-comment-wrap">
        <div class="comment-compact-header">
          <span class="comment-compact-icon">👩</span>
          <span class="comment-compact-label">妻からひとこと</span>
        </div>
        <p class="comment-compact-text" id="wife-comment"></p>
      </div>

      <!-- ⑤ シェア促進コピー＋ボタン群 -->
      <div class="share-section">
        <p class="share-copy">パパ友にもシェアしよう！</p>
        <!-- Xメイン -->
        <button class="btn-share-main" onclick="shareToX()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="white" style="flex-shrink:0"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/></svg>
          X（旧Twitter）でポストする
        </button>
        <!-- サブボタン行 -->
        <div class="share-sub-row">
          <button class="btn-share-sub" onclick="shareToThreads()">
            <svg width="13" height="13" viewBox="0 0 192 192" fill="white" style="flex-shrink:0"><path d="M141.537 88.988a66.667 66.667 0 0 0-2.518-1.143c-1.482-27.307-16.403-42.94-41.457-43.1h-.34c-14.986 0-27.449 6.396-35.12 18.036l13.779 9.452c5.73-8.695 14.724-10.548 21.348-10.548h.229c8.249.053 14.474 2.452 18.503 7.129 2.932 3.405 4.893 8.111 5.864 14.05-7.314-1.243-15.224-1.626-23.68-1.141-23.82 1.371-39.134 15.264-38.105 34.568.522 9.792 5.4 18.216 13.735 23.719 7.047 4.652 16.124 6.927 25.557 6.412 12.458-.683 22.231-5.436 29.049-14.127 5.178-6.6 8.453-15.153 9.899-25.93 5.937 3.583 10.337 8.298 12.767 13.966 4.132 9.635 4.373 25.468-8.546 38.376-11.319 11.308-24.925 16.2-45.488 16.351-22.809-.169-40.06-7.484-51.275-21.742C35.236 139.966 29.808 120.682 29.605 96c.203-24.682 5.631-43.966 16.133-57.317C56.954 24.425 74.205 17.11 97.014 16.94c22.975.17 40.526 7.52 52.171 21.847 5.71 7.026 10.015 15.86 12.853 26.162l16.147-4.308c-3.44-12.68-8.853-23.606-16.219-32.668C147.036 9.607 125.202.195 97.07 0h-.113C68.882.195 47.292 9.6 32.788 27.994 19.882 44.367 13.224 67.438 13.001 96v.072c.223 28.562 6.881 51.633 19.787 68.006C47.292 182.4 68.882 191.805 96.957 192h.113c24.96-.173 42.554-6.708 57.048-21.189 18.963-18.945 18.392-42.692 12.142-57.27-4.484-10.454-13.033-18.945-24.723-24.553Zm-43.096 40.2c-10.426.585-21.247-4.092-21.82-14.136-.427-8.013 5.703-16.951 24.201-18.005 2.115-.122 4.19-.181 6.23-.181 6.145 0 11.905.596 17.157 1.738-1.955 24.334-15.267 29.978-25.768 30.584Z"/></svg>
            Threads
          </button>
          <button class="btn-share-sub" id="btn-native-share" onclick="shareNative()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
            その他シェア
          </button>
        </div>
      </div>

      <!-- ⑥ 再診断ボタン -->
      <button class="btn-retry" onclick="retryQuiz()">
        🔄 もう一度診断する
      </button>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
